<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CV Matcher</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>" />
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .tab-active { @apply border-b-2 border-indigo-600 text-indigo-600 font-semibold; }
  .card { @apply bg-white rounded-xl shadow-md p-5 mb-4; }
  .badge { @apply inline-block bg-indigo-100 text-indigo-700 text-xs font-medium px-2 py-0.5 rounded-full mr-1 mb-1; }
  .badge-green { @apply inline-block bg-green-100 text-green-700 text-xs font-medium px-2 py-0.5 rounded-full mr-1 mb-1; }
  .badge-red   { @apply inline-block bg-red-100   text-red-700   text-xs font-medium px-2 py-0.5 rounded-full mr-1 mb-1; }
  .score-bar   { transition: width 0.6s ease; }
</style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

<!-- Header -->
<header class="bg-indigo-700 text-white px-6 py-4 shadow-lg">
  <div class="max-w-5xl mx-auto flex items-center gap-3">
    <span class="text-3xl">📄</span>
    <div>
      <h1 class="text-2xl font-bold tracking-tight">CV Matcher</h1>
      <p class="text-indigo-200 text-sm">Upload CVs · Browse Candidates · Match Jobs</p>
    </div>
  </div>
</header>

<!-- Tabs -->
<nav class="bg-white border-b shadow-sm sticky top-0 z-10">
  <div class="max-w-5xl mx-auto flex gap-6 px-6">
    <button onclick="showTab('upload')"   id="tab-upload"   class="py-3 text-sm border-b-2 border-transparent text-gray-500 hover:text-indigo-600 transition">⬆️ Upload CV</button>
    <button onclick="showTab('candidates')" id="tab-candidates" class="py-3 text-sm border-b-2 border-transparent text-gray-500 hover:text-indigo-600 transition">👥 Candidates</button>
    <button onclick="showTab('jobs')"     id="tab-jobs"     class="py-3 text-sm border-b-2 border-transparent text-gray-500 hover:text-indigo-600 transition">💼 Jobs</button>
    <button onclick="showTab('match')"    id="tab-match"    class="py-3 text-sm border-b-2 border-transparent text-gray-500 hover:text-indigo-600 transition">🎯 Match</button>
  </div>
</nav>

<main class="max-w-5xl mx-auto px-6 py-8">

<!-- ── Upload CV ─────────────────────────────────────────────── -->
<section id="pane-upload" class="hidden">
  <h2 class="text-xl font-bold text-gray-800 mb-4">Upload CV</h2>
  <div class="card">
    <label class="block">
      <span class="text-sm font-medium text-gray-700 mb-1 block">Select PDF or DOCX file</span>
      <div id="drop-zone"
           class="mt-1 flex flex-col items-center justify-center border-2 border-dashed border-indigo-300 rounded-lg p-10 cursor-pointer hover:border-indigo-500 transition bg-indigo-50"
           ondragover="event.preventDefault()" ondrop="handleDrop(event)" onclick="document.getElementById('cv-file').click()">
        <span class="text-4xl mb-2">📎</span>
        <p class="text-sm text-gray-500">Drag & drop or <span class="text-indigo-600 font-medium">click to browse</span></p>
        <p class="text-xs text-gray-400 mt-1">PDF, DOCX – max 10 MB</p>
        <p id="file-name" class="mt-2 text-sm text-indigo-700 font-medium"></p>
      </div>
      <input id="cv-file" type="file" accept=".pdf,.docx,.doc" class="hidden" onchange="onFileSelect(event)" />
    </label>
    <button onclick="uploadCV()"
            class="mt-4 w-full bg-indigo-600 text-white py-2.5 rounded-lg font-semibold hover:bg-indigo-700 transition disabled:opacity-50"
            id="upload-btn" disabled>
      Upload & Parse
    </button>
    <div id="upload-msg" class="mt-3 text-sm"></div>
  </div>

  <div id="parsed-card" class="card hidden">
    <h3 class="font-semibold text-gray-700 mb-3">Parsed Result</h3>
    <div id="parsed-content"></div>
  </div>
</section>

<!-- ── Candidates ────────────────────────────────────────────── -->
<section id="pane-candidates" class="hidden">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-bold text-gray-800">Candidates</h2>
    <button onclick="loadCandidates()" class="text-sm text-indigo-600 hover:underline">↻ Refresh</button>
  </div>
  <div id="candidates-list"><p class="text-gray-400">Loading…</p></div>
</section>

<!-- ── Jobs ──────────────────────────────────────────────────── -->
<section id="pane-jobs" class="hidden">
  <h2 class="text-xl font-bold text-gray-800 mb-4">Job Descriptions</h2>
  <div class="card">
    <h3 class="font-semibold text-gray-700 mb-3">Add New Job</h3>
    <div class="grid gap-3">
      <input id="job-title" placeholder="Job title (e.g. Senior Python Developer)" class="border rounded-lg px-3 py-2 text-sm w-full focus:ring-2 focus:ring-indigo-300 outline-none" />
      <textarea id="job-desc" rows="5" placeholder="Paste the full job description here…" class="border rounded-lg px-3 py-2 text-sm w-full focus:ring-2 focus:ring-indigo-300 outline-none resize-none"></textarea>
      <div class="flex gap-3">
        <input id="job-exp" type="number" min="0" step="0.5" placeholder="Min experience (years)" class="border rounded-lg px-3 py-2 text-sm w-full focus:ring-2 focus:ring-indigo-300 outline-none" />
        <select id="job-edu" class="border rounded-lg px-3 py-2 text-sm w-full focus:ring-2 focus:ring-indigo-300 outline-none">
          <option value="">Education required (any)</option>
          <option>High School</option><option>Associate</option>
          <option>Bachelor</option><option>Master</option><option>PhD</option>
        </select>
      </div>
      <button onclick="createJob()" class="bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">Create Job</button>
      <div id="job-msg" class="text-sm"></div>
    </div>
  </div>
  <div class="flex items-center justify-between mb-3">
    <h3 class="font-semibold text-gray-700">Existing Jobs</h3>
    <button onclick="loadJobs()" class="text-sm text-indigo-600 hover:underline">↻ Refresh</button>
  </div>
  <div id="jobs-list"><p class="text-gray-400">Loading…</p></div>
</section>

<!-- ── Match ──────────────────────────────────────────────────── -->
<section id="pane-match" class="hidden">
  <h2 class="text-xl font-bold text-gray-800 mb-4">Match Candidates to Job</h2>
  <div class="card">
    <label class="block text-sm font-medium text-gray-700 mb-1">Select Job</label>
    <div class="flex gap-3">
      <select id="match-job-select" class="border rounded-lg px-3 py-2 text-sm flex-1 focus:ring-2 focus:ring-indigo-300 outline-none">
        <option value="">— choose a job —</option>
      </select>
      <button onclick="runMatch()" class="bg-green-600 text-white px-5 py-2 rounded-lg font-semibold hover:bg-green-700 transition">Find Matches</button>
    </div>
  </div>
  <div id="match-results"></div>
</section>

</main>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 right-6 bg-gray-800 text-white text-sm px-4 py-2.5 rounded-lg shadow-xl hidden transition"></div>

<script>
const API = '';   // same origin

// ── Tabs ──────────────────────────────────────────────────────────────────────
function showTab(name) {
  ['upload','candidates','jobs','match'].forEach(t => {
    document.getElementById(`pane-${t}`).classList.add('hidden');
    document.getElementById(`tab-${t}`).classList.remove('border-indigo-600','text-indigo-600','font-semibold');
    document.getElementById(`tab-${t}`).classList.add('border-transparent','text-gray-500');
  });
  document.getElementById(`pane-${name}`).classList.remove('hidden');
  const btn = document.getElementById(`tab-${name}`);
  btn.classList.add('border-indigo-600','text-indigo-600','font-semibold');
  btn.classList.remove('border-transparent','text-gray-500');
  if (name === 'candidates') loadCandidates();
  if (name === 'jobs') loadJobs();
  if (name === 'match') { loadJobs(); loadMatchJobs(); }
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function toast(msg, ok=true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `fixed bottom-6 right-6 text-sm px-4 py-2.5 rounded-lg shadow-xl transition ${ok ? 'bg-green-700' : 'bg-red-700'} text-white`;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 3500);
}

// ── Upload ──────────────────────────────────────────────────────────────────────
let selectedFile = null;

function onFileSelect(e) {
  selectedFile = e.target.files[0];
  if (selectedFile) {
    document.getElementById('file-name').textContent = selectedFile.name;
    document.getElementById('upload-btn').disabled = false;
  }
}

function handleDrop(e) {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) {
    selectedFile = file;
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('upload-btn').disabled = false;
  }
}

async function uploadCV() {
  if (!selectedFile) return;
  const btn = document.getElementById('upload-btn');
  const msg = document.getElementById('upload-msg');
  btn.disabled = true;
  btn.textContent = 'Uploading…';
  msg.textContent = '';

  const fd = new FormData();
  fd.append('file', selectedFile);

  try {
    const res = await fetch(`${API}/candidates/upload`, { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Upload failed');
    msg.innerHTML = `<span class="text-green-600 font-medium">✓ Uploaded successfully!</span>`;
    renderParsedCard(data);
    toast(`${data.full_name} added!`);
  } catch(err) {
    msg.innerHTML = `<span class="text-red-600">✗ ${err.message}</span>`;
    toast(err.message, false);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Upload & Parse';
  }
}

function renderParsedCard(c) {
  const card = document.getElementById('parsed-card');
  card.classList.remove('hidden');
  document.getElementById('parsed-content').innerHTML = `
    <div class="grid grid-cols-2 gap-2 text-sm mb-3">
      <div><span class="text-gray-500">Name:</span> <strong>${c.full_name}</strong></div>
      <div><span class="text-gray-500">Email:</span> ${c.email || '—'}</div>
      <div><span class="text-gray-500">Phone:</span> ${c.phone || '—'}</div>
      <div><span class="text-gray-500">Experience:</span> ${c.years_experience} yrs</div>
      <div><span class="text-gray-500">Education:</span> ${c.education_level || '—'} ${c.education_field ? '('+c.education_field+')' : ''}</div>
    </div>
    <div class="text-sm text-gray-500 mb-1">Skills detected:</div>
    <div>${(c.skills||[]).map(s=>`<span class="badge">${s.name}</span>`).join('') || '<span class="text-gray-400 text-xs">none</span>'}</div>
  `;
}

// ── Candidates ──────────────────────────────────────────────────────────────────
async function loadCandidates() {
  const el = document.getElementById('candidates-list');
  el.innerHTML = '<p class="text-gray-400">Loading…</p>';
  try {
    const res = await fetch(`${API}/candidates`);
    const data = await res.json();
    if (!data.length) { el.innerHTML = '<p class="text-gray-400">No candidates yet.</p>'; return; }
    el.innerHTML = data.map(c => `
      <div class="card hover:shadow-lg transition">
        <div class="flex items-start justify-between">
          <div>
            <h3 class="font-bold text-gray-800 text-lg">${c.full_name}</h3>
            <p class="text-sm text-gray-500">${c.email || ''} ${c.phone ? '· '+c.phone : ''}</p>
          </div>
          <div class="text-right text-sm text-gray-500">
            <div>${c.years_experience} yrs exp</div>
            <div>${c.education_level || '—'}</div>
          </div>
        </div>
        <div class="mt-2">${(c.skills||[]).map(s=>`<span class="badge">${s.name}</span>`).join('')}</div>
        <button onclick="deleteCandidate(${c.id})" class="mt-2 text-xs text-red-500 hover:underline">Delete</button>
      </div>
    `).join('');
  } catch(e) { el.innerHTML = `<p class="text-red-500">${e.message}</p>`; }
}

async function deleteCandidate(id) {
  if (!confirm('Delete this candidate?')) return;
  await fetch(`${API}/candidates/${id}`, {method:'DELETE'});
  toast('Candidate deleted');
  loadCandidates();
}

// ── Jobs ──────────────────────────────────────────────────────────────────────
async function loadJobs() {
  const el = document.getElementById('jobs-list');
  if (!el) return;
  el.innerHTML = '<p class="text-gray-400">Loading…</p>';
  try {
    const res = await fetch(`${API}/jobs`);
    const data = await res.json();
    if (!data.length) { el.innerHTML = '<p class="text-gray-400">No jobs yet.</p>'; return; }
    el.innerHTML = data.map(j => `
      <div class="card">
        <div class="flex items-start justify-between">
          <div>
            <h3 class="font-bold text-gray-800">${j.title}</h3>
            <p class="text-xs text-gray-400">ID: ${j.id} · ${j.min_experience} yrs min · ${j.education_required||'any edu'}</p>
          </div>
          <button onclick="deleteJob(${j.id})" class="text-xs text-red-500 hover:underline">Delete</button>
        </div>
        <p class="text-sm text-gray-600 mt-2 line-clamp-2">${j.description.substring(0,200)}…</p>
        <div class="mt-2">${(j.required_skills||[]).map(s=>`<span class="badge">${s.name}</span>`).join('')}</div>
      </div>
    `).join('');
  } catch(e) { el.innerHTML = `<p class="text-red-500">${e.message}</p>`; }
}

async function loadMatchJobs() {
  try {
    const res = await fetch(`${API}/jobs`);
    const data = await res.json();
    const sel = document.getElementById('match-job-select');
    sel.innerHTML = '<option value="">— choose a job —</option>' +
      data.map(j => `<option value="${j.id}">${j.title} (ID ${j.id})</option>`).join('');
  } catch(e) {}
}

async function createJob() {
  const title = document.getElementById('job-title').value.trim();
  const desc  = document.getElementById('job-desc').value.trim();
  const exp   = parseFloat(document.getElementById('job-exp').value) || 0;
  const edu   = document.getElementById('job-edu').value;
  const msg   = document.getElementById('job-msg');

  if (!title || !desc) { msg.innerHTML='<span class="text-red-500">Title and description are required.</span>'; return; }
  try {
    const res = await fetch(`${API}/jobs`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({title, description:desc, min_experience:exp, education_required:edu||null})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Failed');
    msg.innerHTML=`<span class="text-green-600">✓ Job "${data.title}" created (${data.required_skills.length} skills extracted)</span>`;
    toast('Job created!');
    loadJobs();
  } catch(e) { msg.innerHTML=`<span class="text-red-500">✗ ${e.message}</span>`; toast(e.message,false); }
}

async function deleteJob(id) {
  if (!confirm('Delete this job?')) return;
  await fetch(`${API}/jobs/${id}`, {method:'DELETE'});
  toast('Job deleted');
  loadJobs();
}

// ── Matching ──────────────────────────────────────────────────────────────────
async function runMatch() {
  const jobId = document.getElementById('match-job-select').value;
  const el = document.getElementById('match-results');
  if (!jobId) { toast('Please select a job', false); return; }

  el.innerHTML = '<p class="text-gray-400 mt-4">Matching…</p>';
  try {
    const res = await fetch(`${API}/jobs/${jobId}/matches`);
    const data = await res.json();
    if (!data.length) { el.innerHTML='<p class="text-gray-400 mt-4">No candidates to match.</p>'; return; }

    el.innerHTML = `<p class="text-sm text-gray-500 mt-2 mb-4">${data.length} candidate(s) ranked:</p>` +
      data.map((r,i) => `
        <div class="card hover:shadow-lg transition">
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-lg font-bold text-gray-300 w-7">#${i+1}</span>
                <h3 class="font-bold text-gray-800 text-lg">${r.candidate.full_name}</h3>
                <span class="ml-auto text-2xl font-extrabold ${scoreColor(r.score)}">${r.score.toFixed(0)}%</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-2 mb-3">
                <div class="score-bar h-2 rounded-full ${scoreBarColor(r.score)}" style="width:${r.score}%"></div>
              </div>
              <div class="grid grid-cols-3 gap-2 text-xs text-gray-500 mb-2">
                <div>Skills <strong class="text-gray-700">${r.skill_score.toFixed(0)}%</strong></div>
                <div>Experience <strong class="text-gray-700">${r.experience_score.toFixed(0)}%</strong></div>
                <div>Education <strong class="text-gray-700">${r.education_score.toFixed(0)}%</strong></div>
              </div>
              <p class="text-xs text-gray-500">${r.candidate.email || ''} · ${r.candidate.years_experience} yrs · ${r.candidate.education_level||'—'}</p>
            </div>
          </div>
          <div class="mt-2">
            ${r.matched_skills.map(s=>`<span class="badge-green">${s}</span>`).join('')}
            ${r.missing_skills.map(s=>`<span class="badge-red">✗ ${s}</span>`).join('')}
          </div>
        </div>
      `).join('');
  } catch(e) { el.innerHTML=`<p class="text-red-500 mt-4">${e.message}</p>`; toast(e.message,false); }
}

function scoreColor(s) {
  if (s >= 75) return 'text-green-600';
  if (s >= 50) return 'text-yellow-600';
  return 'text-red-500';
}
function scoreBarColor(s) {
  if (s >= 75) return 'bg-green-500';
  if (s >= 50) return 'bg-yellow-400';
  return 'bg-red-400';
}

// init
showTab('upload');
</script>
</body>
</html>
